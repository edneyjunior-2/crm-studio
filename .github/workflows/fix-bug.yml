name: Fix Bug (Claude Code)

# Mesmo padrão do skill "orquestrar" do projeto: Sonnet constrói (barato,
# rápido), Opus revisa depois — de forma INDEPENDENTE, sem ter escrito o
# código — antes de virar PR. Se a revisão reprova, tenta corrigir mais uma
# vez (teto de 2 rodadas — isso roda sozinho, sem ninguém pra intervir se
# entrar em loop). O CI (ci.yml) roda de novo em cima do PR de qualquer
# forma; nada aqui faz merge sozinho.

on:
  workflow_dispatch:
    inputs:
      bug_id:
        description: 'ID do bug report'
        required: true
      prompt:
        description: 'Prompt de correção gerado pelo Claude'
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
    env:
      # NUNCA usar ${{ github.event.inputs.* }} direto dentro de um `run:` —
      # vira texto colado cru no script antes do bash rodar. O prompt real
      # (bug 2f3344d1) tinha `CREATE POLICY "admins podem..."` embutido, e a
      # aspa dupla fechou a string do bash no meio, quebrando `gh pr create`
      # com "unknown arguments". Passar por env resolve: o valor chega como
      # variável de ambiente de verdade, sem re-interpretação pelo shell.
      BUG_ID: ${{ github.event.inputs.bug_id }}
      BUG_PROMPT: ${{ github.event.inputs.prompt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Instalar dependências
        run: npm ci

      - name: Criar branch
        run: |
          BRANCH="fix/bug-$BUG_ID"
          git config user.name "Claude Code Bot"
          git config user.email "bot@crmstudio.com.br"
          git checkout -b "$BRANCH"

      - name: "Build (Sonnet) — aplica a correção"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # --dangerously-skip-permissions: sem isso o Claude não consegue usar
          # Edit/Bash num runner sem interação (não tem como aprovar o prompt).
          # Seguro aqui: runner efêmero, isolado, escopado só a este checkout.
          claude --print --model claude-sonnet-5 --dangerously-skip-permissions \
            "$BUG_PROMPT

          Após aplicar a correção:
          1. Rode: npx tsc --noEmit
          2. Se passar, faça git add e git commit com mensagem clara
          3. NÃO faça git push — o workflow cuida disso" > /tmp/build-1.md

          echo "--- Build (Sonnet), rodada 1 ---"
          cat /tmp/build-1.md

      - name: Checar se algo mudou
        id: diff
        run: |
          # git diff main (sem --staged) pega os dois casos: o Claude pode
          # seguir a instrução do prompt e commitar sozinho (working tree
          # limpo, mas HEAD já diverge de main), ou deixar tudo por commitar.
          # A checagem antiga (diff --staged + diff, sem comparar com main)
          # só via o 2º caso — bug real, visto em produção: o run do bug
          # a4788406 comitou certinho (Sonnet disse "Committed as 44f3c03")
          # e ainda assim caiu em "Nenhuma mudança aplicada", sem abrir PR.
          if git diff --quiet main; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma mudança aplicada — nada a revisar ou commitar."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Gate — type check (rodada 1)"
        if: steps.diff.outputs.changed == 'true'
        run: npx tsc --noEmit

      - name: "Review (Opus) — independente, rodada 1"
        if: steps.diff.outputs.changed == 'true'
        id: review1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(git diff main)
          claude --print --model claude-opus-4-8 \
            "Você é um revisor cético e independente — não escreveu este código, só vai julgá-lo. Um outro agente (Sonnet) recebeu este bug reportado por um usuário e este prompt de correção, e produziu o diff abaixo.

          --- BUG / PROMPT ORIGINAL ---
          $BUG_PROMPT

          --- DIFF APLICADO ---
          $DIFF

          Avalie com rigor: (1) o diff plausivelmente resolve a CAUSA RAIZ do bug descrito, ou só mexe em algo parecido sem resolver de fato? (2) tem algo incompleto, arriscado (ex: RLS mais permissiva que deveria, dado exposto) ou obviamente errado? (3) o que um humano DEVE testar manualmente antes de mergear, reproduzindo o bug original?
          Responda em português. A PRIMEIRA LINHA deve ser exatamente uma destas duas, sem mais nada na linha: 'VEREDITO: aprovado' ou 'VEREDITO: reprovado' — só aprove se você apostaria que esse diff resolve o bug. Depois, até 200 palavras justificando." > /tmp/review-1.md

          echo "--- Review (Opus), rodada 1 ---"
          cat /tmp/review-1.md
          {
            echo "veredito<<VEREDITO_EOF"
            head -1 /tmp/review-1.md
            echo "VEREDITO_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "Build (Sonnet) — correção, rodada 2 (só se reprovado)"
        if: steps.diff.outputs.changed == 'true' && contains(steps.review1.outputs.veredito, 'reprovado')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --model claude-sonnet-5 --dangerously-skip-permissions \
            "Sua correção anterior para este bug foi reprovada numa revisão independente. Ajuste o código pra resolver os pontos levantados — não ignore a crítica.

          --- BUG / PROMPT ORIGINAL ---
          $BUG_PROMPT

          --- CRÍTICA DA REVISÃO ---
          $(cat /tmp/review-1.md)

          Após ajustar: rode npx tsc --noEmit, e se passar faça git add + git commit (NÃO dê push)." > /tmp/build-2.md

          echo "--- Build (Sonnet), rodada 2 ---"
          cat /tmp/build-2.md

      - name: "Gate — type check (rodada 2)"
        if: steps.diff.outputs.changed == 'true' && contains(steps.review1.outputs.veredito, 'reprovado')
        run: npx tsc --noEmit

      - name: "Review (Opus) — independente, rodada final"
        if: steps.diff.outputs.changed == 'true' && contains(steps.review1.outputs.veredito, 'reprovado')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(git diff main)
          claude --print --model claude-opus-4-8 \
            "Segunda rodada de revisão do mesmo bug, com o mesmo rigor da primeira — o código foi ajustado depois da sua crítica anterior.

          --- BUG / PROMPT ORIGINAL ---
          $BUG_PROMPT

          --- DIFF ATUALIZADO ---
          $DIFF

          A PRIMEIRA LINHA deve ser exatamente 'VEREDITO: aprovado' ou 'VEREDITO: reprovado', sem mais nada na linha. Depois, até 150 palavras — se ainda reprovar, diga claramente o que continua faltando (não haverá mais rodadas automáticas depois desta)." > /tmp/review-2.md

          echo "--- Review (Opus), rodada final ---"
          cat /tmp/review-2.md

      - name: Commit e push
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="fix/bug-$BUG_ID"
          # Condicional: o Claude pode já ter commitado sozinho (seguindo a
          # instrução do prompt) — nesse caso não sobra nada pra "git add -A"
          # e um commit incondicional falharia com "nothing to commit" (o
          # step roda com bash -e). Só commita aqui se ainda houver algo solto.
          if ! git diff --staged --quiet || ! git diff --quiet; then
            git add -A
            git commit -m "fix: correção automática do bug $BUG_ID

          Aplicado via Claude Code (Sonnet), revisado de forma independente por Opus.
          Co-Authored-By: Claude Code Bot <bot@crmstudio.com.br>"
          fi
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/bug-$BUG_ID"
          REVIEW_FINAL=$(cat /tmp/review-2.md 2>/dev/null || cat /tmp/review-1.md)
          VEREDITO_LINHA=$(head -1 <<< "$REVIEW_FINAL")

          # --body-file em vez de --body inline: corpo grande com markdown,
          # crase e possíveis aspas do diff/revisão — arquivo evita qualquer
          # limite ou aresta de quoting na linha de comando.
          {
            echo "## Correção automática (Sonnet, revisada de forma independente por Opus)"
            echo
            echo "**Bug ID:** \`$BUG_ID\`"
            echo
            echo "**Prompt utilizado:**"
            echo '```'
            echo "$BUG_PROMPT"
            echo '```'
            echo
            echo "## Revisão independente (Opus)"
            echo "$REVIEW_FINAL"
            echo
            echo "## Antes de mergear"
            echo "- [ ] Esperei o CI (lint/tsc/build) ficar verde neste PR"
            echo "- [ ] Testei manualmente reproduzindo o bug original"
            echo "- [ ] Revisei o diff linha a linha"
            echo
            echo "> A revisão acima é automática e **não substitui teste manual** — principalmente em bugs de permissão/dados (RLS), onde \`tsc\` passar não garante que o comportamento certo aconteceu. Se o veredito acima for 'reprovado', trate como um alerta forte, não como algo pronto pra mergear."
            echo
            echo "🤖 Gerado automaticamente pelo sistema de auto-healing do CRM Studio."
          } > /tmp/pr-body.md

          gh pr create \
            --title "fix: correção do bug $BUG_ID — $VEREDITO_LINHA" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
